name: Build Release Installers

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-macos:
    name: macOS arm64 DMG
    runs-on: macos-14
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      AI_MODEL_URL: ${{ secrets.AI_MODEL_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download AI model asset
        if: env.AI_MODEL_URL != ''
        shell: bash
        run: |
          mkdir -p resources/ai/models
          curl -L "$AI_MODEL_URL" -o resources/ai/models/qwen3.5-0.8b.gguf

      - name: Verify bundled AI assets
        env:
          AI_REQUIRED_RUNTIMES: darwin-arm64
        run: npm run check:prompts && npm run check:ai-assets

      - name: Build macOS installer
        run: npm run build && npm run electron:compile && npx electron-builder --mac dmg --arm64

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aquariusgirl-macos-arm64
          path: |
            release/*.dmg
            release/*.blockmap
          if-no-files-found: error

  build-windows:
    name: Windows x64 NSIS
    runs-on: windows-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      AI_MODEL_URL: ${{ secrets.AI_MODEL_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download AI model asset
        if: env.AI_MODEL_URL != ''
        shell: bash
        run: |
          mkdir -p resources/ai/models
          curl -L "$AI_MODEL_URL" -o resources/ai/models/qwen3.5-0.8b.gguf

      - name: Verify bundled AI assets
        env:
          AI_REQUIRED_RUNTIMES: win32-x64
        run: npm run check:prompts && npm run check:ai-assets

      - name: Build Windows installer
        run: npm run build && npm run electron:compile && npx electron-builder --win nsis --x64

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aquariusgirl-windows-x64
          path: |
            release/*.exe
            release/*.blockmap
          if-no-files-found: error
